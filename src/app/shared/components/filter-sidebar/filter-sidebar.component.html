<aside [class.translate-x-0]="isOpen" [class.-translate-x-full]="!isOpen"
    class="fixed inset-y-0 left-0 z-40 w-64 bg-white shadow-xl transform transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:inset-auto lg:shadow-none border-r border-gray-200">

    <div class="p-6 h-full overflow-y-auto">
        <div class="flex justify-between items-center mb-6 lg:hidden">
            <h2 class="text-xl font-bold uppercase">Filtres</h2>
            <button (click)="closeSidebar()">
                <fa-icon [icon]="icons.close"></fa-icon>
            </button>
        </div>

        <h2 class="hidden lg:block text-xl font-bold uppercase mb-6 tracking-wide">Filtres</h2>

        <form [formGroup]="filterForm" class="space-y-6">
            <!-- Search -->
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Recherche</label>
                <div class="relative">
                    <input type="text" formControlName="search" placeholder="Nom du produit..."
                        class="w-full pl-8 pr-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-black transition-colors">
                    <fa-icon [icon]="icons.search" class="absolute left-3 top-3 text-gray-400 text-xs"></fa-icon>
                </div>
            </div>

            <!-- Categories -->
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Catégorie</label>
                <div class="space-y-2 max-h-48 overflow-y-auto custom-scrollbar">
                    <label class="flex items-center gap-2 cursor-pointer hover:bg-gray-50 p-1 rounded">
                        <input type="radio" formControlName="category" value="" class="text-black focus:ring-black">
                        <span class="text-sm">Toutes</span>
                    </label>
                    @for (cat of categories; track cat._id) {
                    <label class="flex items-center gap-2 cursor-pointer hover:bg-gray-50 p-1 rounded">
                        <input type="radio" formControlName="category" [value]="cat._id || cat.name"
                            class="text-black focus:ring-black">
                        <span class="text-sm">{{ cat.name }}</span>
                    </label>
                    }
                </div>
            </div>

            <!-- Shops -->
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Boutique</label>
                <div class="space-y-2 max-h-48 overflow-y-auto custom-scrollbar">
                    <label class="flex items-center gap-2 cursor-pointer hover:bg-gray-50 p-1 rounded">
                        <input type="radio" formControlName="shop" value="" class="text-black focus:ring-black">
                        <span class="text-sm">Toutes</span>
                    </label>
                    @for (shop of shops; track shop._id) {
                    <label class="flex items-center gap-2 cursor-pointer hover:bg-gray-50 p-1 rounded">
                        <input type="radio" formControlName="shop" [value]="shop._id"
                            class="text-black focus:ring-black">
                        <span class="text-sm">{{ shop.name }}</span>
                    </label>
                    }
                </div>
            </div>

            <!-- Price Range -->
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Prix (Ar)</label>
                <div class="flex items-center gap-2">
                    <input type="number" formControlName="minPrice" placeholder="Min"
                        class="w-full p-2 border border-gray-300 rounded focus:border-black outline-none text-sm">
                    <span class="text-gray-400">-</span>
                    <input type="number" formControlName="maxPrice" placeholder="Max"
                        class="w-full p-2 border border-gray-300 rounded focus:border-black outline-none text-sm">
                </div>
            </div>

            <!-- Buttons -->
            <div class="pt-4 space-y-2">
                <button type="button" (click)="resetFilters()"
                    class="w-full py-2 border border-gray-300 text-gray-600 text-xs font-bold uppercase hover:bg-gray-50 transition-colors">
                    Réinitialiser
                </button>
            </div>
        </form>
    </div>
</aside>
