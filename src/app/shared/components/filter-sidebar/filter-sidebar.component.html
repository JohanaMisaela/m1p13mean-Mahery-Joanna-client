<aside
  [class.translate-x-0]="isOpen"
  [class.-translate-x-full]="!isOpen"
  class="fixed inset-y-0 left-0 z-40 w-64 bg-white shadow-xl transform transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:inset-auto lg:shadow-none border-r border-gray-100 h-full flex flex-col"
>
  <!-- Sidebar Header (Title) -->
  <div class="p-6 border-b border-gray-50 flex-shrink-0">
    <div class="flex justify-between items-center lg:hidden">
      <h2 class="text-xl font-bold uppercase">Filtres</h2>
      <button (click)="closeSidebar()">
        <fa-icon [icon]="icons.close"></fa-icon>
      </button>
    </div>
    <h2 class="hidden lg:block text-xl font-bold uppercase tracking-wide">Filtres</h2>
  </div>

  <!-- Sidebar Body (Scrollable Filters) -->
  <div class="flex-grow overflow-y-auto p-6">
    <form [formGroup]="filterForm" class="space-y-6">
      <!-- Search -->
      <div>
        <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Recherche</label>
        <div class="relative">
          <input
            type="text"
            formControlName="search"
            placeholder="Nom du produit..."
            class="w-full pl-8 pr-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-black transition-colors"
          />
          <fa-icon
            [icon]="icons.search"
            class="absolute left-3 top-3 text-gray-400 text-xs"
          ></fa-icon>
        </div>
      </div>

      <!-- Categories -->
      <div class="space-y-2">
        <app-select
          label="Catégorie"
          [options]="categoryOptions"
          formControlName="category"
          placeholder="Toutes les catégories"
        ></app-select>
      </div>

      <!-- Shops -->
      @if (showShopFilter) {
        <div class="space-y-2">
          <app-select
            label="Boutique"
            [options]="shopOptions"
            formControlName="shop"
            placeholder="Toutes les boutiques"
          ></app-select>
        </div>
      }

      <!-- Price Range -->
      <div>
        <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Prix (Ar)</label>
        <div class="flex items-center gap-2">
          <input
            type="number"
            formControlName="minPrice"
            placeholder="Min"
            class="w-full p-2 border border-gray-300 rounded focus:border-black outline-none text-sm"
          />
          <span class="text-gray-400">-</span>
          <input
            type="number"
            formControlName="maxPrice"
            placeholder="Max"
            class="w-full p-2 border border-gray-300 rounded focus:border-black outline-none text-sm"
          />
        </div>
      </div>

      <!-- Reset Button -->
      <div class="pt-4">
        <button
          type="button"
          (click)="resetFilters()"
          class="w-full py-3 border border-gray-100 text-gray-400 text-[10px] uppercase tracking-widest font-medium hover:border-black hover:text-black transition-all"
        >
          Réinitialiser
        </button>
      </div>
    </form>
  </div>

  <!-- Sidebar Footer -->
  <div class="border-t border-gray-50 w-full bg-white fixed bottom-0">
    <!-- Navigation Link -->
    <div class="p-8">
      <a
        [routerLink]="sidebarLink"
        (click)="closeSidebar()"
        class="flex items-center justify-between group no-underline"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-8 h-8 bg-gray-50 flex items-center justify-center group-hover:bg-black group-hover:text-white transition-colors"
          >
            <fa-icon
              [icon]="sidebarLink === '/' ? icons.prev : icons.shop"
              class="text-[10px]"
            ></fa-icon>
          </div>
          <div class="flex flex-col">
            <span class="text-[10px] text-gray-300 uppercase tracking-widest mb-0.5">{{
              sidebarNavText
            }}</span>
            <span
              class="text-xs font-medium text-gray-600 group-hover:text-black transition-colors uppercase tracking-widest"
              >{{ sidebarLabel }}</span
            >
          </div>
        </div>
        <fa-icon
          [icon]="icons.search"
          class="text-[8px] text-gray-300 group-hover:text-black transition-colors opacity-0 group-hover:opacity-100 transform translate-x-[-10px] group-hover:translate-x-0 duration-300"
        ></fa-icon>
      </a>
    </div>
  </div>
</aside>
