<div class="bg-white border border-gray-100 shadow-sm rounded-xl overflow-hidden">
  <div class="bg-white border-b border-gray-100 p-6">
    <div class="flex flex-wrap items-center gap-6">
      <!-- Text Filters -->
      <div class="flex-grow grid grid-cols-1 md:grid-cols-3 xl:grid-cols-5 gap-4">
        <div class="relative">
          <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1.5 block"
            >Client</label
          >
          <input
            type="text"
            [ngModel]="filterClient()"
            (ngModelChange)="filterClient.set($event); applyFilters()"
            placeholder="Nom ou Email..."
            class="w-full bg-gray-50 border-none rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-black/5 transition-all outline-none"
          />
        </div>

        <div class="relative">
          <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1.5 block"
            >Article</label
          >
          <input
            type="text"
            [ngModel]="filterItem()"
            (ngModelChange)="filterItem.set($event); applyFilters()"
            placeholder="Nom du produit..."
            class="w-full bg-gray-50 border-none rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-black/5 transition-all outline-none"
          />
        </div>

        <div class="relative">
          <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1.5 block"
            >Statut</label
          >
          <select
            [ngModel]="filterStatus()"
            (ngModelChange)="filterStatus.set($event); applyFilters()"
            class="w-full bg-gray-50 border-none rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-black/5 transition-all outline-none appearance-none"
          >
            <option value="">Tous les statuts</option>
            <option value="PENDING">En attente</option>
            <option value="CONFIRMED">Confirmée</option>
            <option value="SHIPPED">Expédiée</option>
            <option value="CANCELLED">Annulée</option>
            <option value="REJECTED">Rejetée</option>
          </select>
        </div>

        <div class="relative">
          <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1.5 block"
            >Total Min</label
          >
          <input
            type="number"
            [ngModel]="filterMinTotal()"
            (ngModelChange)="filterMinTotal.set($event); applyFilters()"
            placeholder="Ar 0"
            class="w-full bg-gray-50 border-none rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-black/5 transition-all outline-none"
          />
        </div>

        <div class="relative">
          <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1.5 block"
            >Total Max</label
          >
          <input
            type="number"
            [ngModel]="filterMaxTotal()"
            (ngModelChange)="filterMaxTotal.set($event); applyFilters()"
            placeholder="Ar Max"
            class="w-full bg-gray-50 border-none rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-black/5 transition-all outline-none"
          />
        </div>
      </div>

      <!-- Actions -->
      <div class="flex items-end self-end pb-0.5">
        <button
          (click)="resetFilters()"
          class="text-[10px] uppercase tracking-widest text-gray-400 hover:text-black font-bold transition-colors"
        >
          Réinitialiser
        </button>
      </div>
    </div>
  </div>

  <!-- Header -->
  <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
    <div>
      <h2 class="text-lg font-semibold text-gray-900 tracking-tight">Commandes Récentes</h2>
      <p class="text-sm text-gray-500 mt-1">Gérez vos commandes clients</p>
    </div>
    <div class="flex items-center space-x-2">
      <span
        class="px-3 py-1 bg-white border border-gray-200 rounded-full text-xs font-medium text-gray-600 shadow-sm"
      >
        Total: {{ total() }}
      </span>
    </div>
  </div>

  <!-- Loading State -->
  @if (loading()) {
    <div class="p-12 flex justify-center items-center">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-black"></div>
    </div>
  } @else if (orders().length === 0) {
    <!-- Empty State -->
    <app-empty-state
      title="Aucune commande"
      message="Vous n'avez pas encore reçu de commandes clients."
      [icon]="icons.bag"
    >
    </app-empty-state>
  } @else {
    <!-- Orders List -->
    <div class="p-6 space-y-6 bg-gray-50/30">
      @for (order of orders(); track order._id) {
        <app-shop-order-card [order]="order" (statusUpdate)="updateStatus($event)">
        </app-shop-order-card>
      }
    </div>

    <!-- Pagination -->
    <div class="px-8 py-6 border-t border-gray-100 bg-white">
      <app-pagination
        [currentPage]="page()"
        [totalPages]="totalPages()"
        (pageChange)="changePage($event)"
      >
      </app-pagination>
    </div>
  }
</div>

@if (showConfirmModal()) {
  <app-confirm-modal
    [title]="'Changement de statut'"
    [message]="
      'Voulez-vous vraiment changer le statut de cette commande en ' + pendingUpdate()?.label + ' ?'
    "
    [confirmText]="'Confirmer'"
    [cancelText]="'Annuler'"
    [type]="'info'"
    (confirm)="confirmStatusUpdate()"
    (cancel)="cancelStatusUpdate()"
  ></app-confirm-modal>
}
