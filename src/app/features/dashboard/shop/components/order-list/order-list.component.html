<div class="bg-white border border-gray-100 shadow-sm rounded-xl overflow-hidden">
    <!-- Header -->
    <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
        <div>
            <h2 class="text-lg font-semibold text-gray-900 tracking-tight">Commandes Récentes</h2>
            <p class="text-sm text-gray-500 mt-1">Gérez vos commandes clients</p>
        </div>
        <div class="flex items-center space-x-2">
            <span
                class="px-3 py-1 bg-white border border-gray-200 rounded-full text-xs font-medium text-gray-600 shadow-sm">
                Total: {{ total() }}
            </span>
        </div>
    </div>

    <!-- Loading State -->
    @if (loading()) {
    <div class="p-12 flex justify-center items-center">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-black"></div>
    </div>
    } @else if (orders().length === 0) {
    <!-- Empty State -->
    <app-empty-state title="Aucune commande" message="Vous n'avez pas encore reçu de commandes clients."
        [icon]="icons.left">
        <!-- icon will be overwritten anyway if not specified correctly, but icons object is small now -->
    </app-empty-state>
    } @else {
    <!-- Orders List -->
    <div class="p-6 space-y-6 bg-gray-50/30">
        @for (order of orders(); track order._id) {
        <app-shop-order-card [order]="order" (statusUpdate)="updateStatus($event)">
        </app-shop-order-card>
        }
    </div>

    <!-- Pagination -->
    <div class="p-4 border-t border-gray-100 flex items-center justify-between">
        <button [disabled]="page() === 1" (click)="changePage(page() - 1)"
            class="px-4 py-2 border border-gray-200 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
            <fa-icon [icon]="icons.left" class="mr-2"></fa-icon> Précédent
        </button>
        <span class="text-sm text-gray-500">
            Page <span class="font-medium text-gray-900">{{ page() }}</span> sur {{ totalPages() }}
        </span>
        <button [disabled]="page() === totalPages()" (click)="changePage(page() + 1)"
            class="px-4 py-2 border border-gray-200 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
            Suivant <fa-icon [icon]="icons.right" class="ml-2"></fa-icon>
        </button>
    </div>
    }
</div>
