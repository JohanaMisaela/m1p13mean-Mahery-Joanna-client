<div class="bg-white rounded border shadow-sm p-6" [class.border-blue-100]="isEdit" [class.border-gray-200]="!isEdit"
    [class.ring-1]="isEdit" [class.ring-blue-50]="isEdit">
    <!-- Form Header -->
    <div class="flex justify-between items-center mb-6 border-b border-gray-50 pb-4">
        <h3 class="text-xs font-bold uppercase tracking-widest" [class.text-blue-600]="isEdit"
            [class.text-gray-700]="!isEdit">
            {{ isEdit ? 'Modification Produit' : 'Nouveau Produit' }}
        </h3>
        <div class="flex gap-2">
            <button (click)="cancel.emit()"
                class="text-gray-400 hover:text-black text-xs uppercase font-bold">Annuler</button>
            <button (click)="onSave()"
                [class]="isEdit ? 'bg-blue-600 hover:bg-blue-700 shadow-blue-100' : 'bg-black hover:bg-gray-800 shadow-gray-200'"
                class="text-white px-6 py-1.5 text-xs uppercase font-bold rounded-sm transition-colors shadow-lg">Enregistrer</button>
        </div>
    </div>

    <!-- Product Basic Info -->
    <div class="grid grid-cols-12 gap-6 mb-8">
        <div class="col-span-12">
            <label class="block text-[10px] uppercase font-bold text-gray-400 mb-1">Nom du Produit</label>
            <input type="text" [(ngModel)]="form.name"
                class="w-full text-sm border-gray-200 rounded-sm focus:ring-0 p-2.5 bg-gray-50/50"
                [class.focus:border-blue-500]="isEdit" [class.focus:border-black]="!isEdit">
        </div>

        <div class="col-span-12 lg:col-span-5 space-y-4">
            <div>
                <label class="block text-[10px] uppercase font-bold text-gray-400 mb-2">Catégories</label>
                <div class="space-y-3 bg-gray-50/30 p-4 rounded-lg border border-gray-100/50">
                    <!-- Selected Categories Badges -->
                    <div *ngIf="form.categories?.length" class="flex flex-wrap gap-2 mb-3">
                        <span *ngFor="let catId of form.categories"
                            class="text-white px-2 py-1 rounded text-[10px] uppercase font-bold flex items-center gap-1 animate-in zoom-in-50 duration-200"
                            [class.bg-blue-600]="isEdit" [class.bg-black]="!isEdit">
                            {{ getCategoryName(catId) }}
                            <button (click)="toggleCategorySelection(catId)"
                                class="hover:text-red-300 font-bold ml-1">×</button>
                        </span>
                    </div>

                    <div *ngIf="form.categories?.length" class="h-px bg-gray-100 my-2"></div>

                    <!-- Existing Categories Toggle Buttons -->
                    <div class="flex flex-wrap gap-2">
                        <button *ngFor="let cat of categories" (click)="toggleCategorySelection(cat._id)"
                            [class]="isCategorySelected(cat._id) ? (isEdit ? 'bg-blue-600 text-white border-blue-600' : 'bg-black text-white border-black') : 'bg-white text-gray-600 border-gray-200 hover:border-blue-400'"
                            class="px-3 py-1.5 text-xs rounded border transition-all">
                            {{ cat.name }}
                        </button>
                    </div>

                    <div class="h-px bg-gray-100 my-2"></div>

                    <!-- Add New Category -->
                    <div class="flex flex-wrap gap-2 items-center">
                        <button *ngIf="!showNewCategoryInput" (click)="showNewCategoryInput = true"
                            class="text-[10px] uppercase font-bold text-gray-400 hover:text-blue-600 hover:bg-white border border-dashed border-gray-300 rounded px-3 py-1.5 transition-all">
                            + Nouvelle Catégorie
                        </button>
                        <div *ngIf="showNewCategoryInput"
                            class="flex gap-2 animate-in slide-in-from-left-2 duration-300 bg-white p-2 rounded shadow-md border border-gray-100 w-full md:w-auto">
                            <input type="text" [(ngModel)]="newCategoryName" (keyup.enter)="onCreateCategory()"
                                placeholder="Nom de la catégorie..."
                                class="text-xs border-gray-200 rounded-sm focus:border-blue-500 p-2 w-full md:w-48 bg-gray-50/50">
                            <button (click)="onCreateCategory()"
                                class="bg-blue-600 text-white px-4 py-2 text-[10px] uppercase font-bold rounded shadow-sm hover:bg-blue-700 transition-colors">Ajouter</button>
                            <button (click)="showNewCategoryInput = false"
                                class="text-gray-400 hover:text-red-500 font-bold px-2 text-lg">×</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-7 space-y-4">
            <div>
                <label class="block text-[10px] uppercase font-bold text-gray-400 mb-1">Description</label>
                <textarea [(ngModel)]="form.description" rows="1"
                    class="w-full text-sm border-gray-200 rounded-sm focus:ring-0 p-2.5 bg-gray-50/50 h-[42px] min-h-[42px] resize-none"
                    [class.focus:border-blue-500]="isEdit" [class.focus:border-black]="!isEdit"></textarea>
            </div>
            <div>
                <label class="block text-[10px] uppercase font-bold text-gray-400 mb-1">Tags ( SEO )</label>
                <input type="text" [(ngModel)]="form.tags"
                    class="w-full text-sm border-gray-200 rounded-sm focus:ring-0 p-2.5 bg-gray-50/50"
                    [class.focus:border-blue-500]="isEdit" [class.focus:border-black]="!isEdit">
            </div>
        </div>
    </div>

    <!-- Variants Section -->
    <div class="border-t border-gray-100 pt-6">
        <div class="flex justify-between items-center mb-4">
            <h4 class="text-[10px] uppercase font-bold text-gray-400">Variantes</h4>
            <button (click)="addVariant()"
                class="text-xs font-medium text-blue-600 hover:underline flex items-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                Ajouter Variante
            </button>
        </div>

        <div class="space-y-3">
            <!-- Headers -->
            <div
                class="hidden md:grid grid-cols-[120px_1fr_80px_80px_200px_40px] gap-4 px-4 text-[10px] uppercase font-bold text-gray-400 mb-1">
                <div>SKU</div>
                <div>Attributs</div>
                <div class="text-center">Stock</div>
                <div class="text-center">Prix</div>
                <div>Images</div>
                <div></div>
            </div>

            <div *ngFor="let variant of form.variants; let i = index"
                class="md:grid md:grid-cols-[120px_1fr_80px_80px_200px_40px] flex flex-wrap items-start gap-4 p-4 bg-gray-50 rounded border border-gray-100 relative group transition-all hover:bg-white hover:shadow-md">

                <!-- SKU -->
                <div>
                    <input type="text" [(ngModel)]="variant.sku" placeholder="SKU"
                        class="w-full text-xs border-gray-200 rounded-sm focus:border-blue-500 p-2 bg-white shadow-sm">
                </div>

                <!-- Attributes -->
                <div class="flex flex-wrap gap-2 items-center">
                    <div *ngFor="let attr of variant.attributes; let ai = index"
                        class="flex items-center gap-1 bg-white border border-gray-200 rounded px-2 py-1 shadow-sm">
                        <input type="text" [(ngModel)]="attr.key" placeholder="Key"
                            class="w-14 text-[10px] border-none p-0 focus:ring-0 text-gray-500 font-medium bg-transparent">
                        <span class="text-gray-300">:</span>
                        <input type="text" [(ngModel)]="attr.value" placeholder="Val"
                            class="w-14 text-[10px] border-none p-0 focus:ring-0 text-black font-semibold bg-transparent">
                        <button (click)="removeAttribute(i, ai)"
                            class="text-gray-300 hover:text-red-500 ml-1">×</button>
                    </div>
                    <button (click)="addAttribute(i)"
                        class="text-[10px] uppercase font-bold text-gray-400 hover:text-blue-600 border border-dashed border-gray-300 rounded px-2 py-1 transition-all hover:bg-white">
                        + Attr
                    </button>
                </div>

                <!-- Stock -->
                <div>
                    <input type="number" [(ngModel)]="variant.stock"
                        class="w-full text-xs border-gray-200 rounded-sm focus:border-blue-500 p-2 text-center bg-white shadow-sm">
                </div>

                <!-- Price -->
                <div>
                    <input type="number" [(ngModel)]="variant.price"
                        class="w-full text-xs border-gray-200 rounded-sm focus:border-blue-500 p-2 text-center bg-white shadow-sm">
                </div>

                <!-- Images -->
                <div class="flex items-center gap-2">
                    <div class="flex -space-x-2 overflow-hidden py-1">
                        <img *ngFor="let img of variant.images | slice:0:3" [src]="img"
                            class="inline-block h-8 w-8 rounded-full ring-2 ring-white object-cover bg-gray-100">
                        <div *ngIf="variant.images?.length > 3"
                            class="flex h-8 w-8 items-center justify-center rounded-full bg-gray-100 ring-2 ring-white text-[10px] font-bold text-gray-500">
                            +{{variant.images.length - 3}}
                        </div>
                        <div *ngIf="!variant.images?.length" class="text-[10px] text-gray-300 italic">Vide</div>
                    </div>
                    <button (click)="openImageModal.emit(variant)"
                        class="p-1.5 rounded border border-dashed border-gray-300 hover:border-black hover:text-black transition-colors focus:outline-none">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4">
                            </path>
                        </svg>
                    </button>
                </div>

                <!-- Delete Variant -->
                <div class="flex items-center justify-end">
                    <button *ngIf="form.variants.length > 1" (click)="removeVariant(i)"
                        class="text-gray-300 hover:text-red-500 transition-colors p-2 hover:bg-red-50 rounded">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
