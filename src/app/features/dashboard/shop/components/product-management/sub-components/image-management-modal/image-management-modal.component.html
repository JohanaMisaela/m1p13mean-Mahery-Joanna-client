<div
    class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm animate-in fade-in duration-200">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden animate-in zoom-in-95 duration-200">
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
            <h3 class="text-sm font-bold uppercase tracking-widest text-gray-700">Gérer les images</h3>
            <button (click)="close.emit()" class="text-gray-400 hover:text-gray-900 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>

        <div class="p-6">
            <!-- Add Image Row -->
            <div class="grid grid-cols-12 gap-4 mb-6">
                <!-- URL Input -->
                <div class="col-span-12">
                    <label class="block text-[10px] uppercase font-bold text-gray-400 mb-1">Ajouter par URL</label>
                    <div class="flex gap-2">
                        <input type="text" [(ngModel)]="imageToAdd" placeholder="https://..."
                            class="flex-grow text-xs border-gray-200 rounded focus:border-black p-2 bg-gray-50">
                        <button (click)="addImageUrl()"
                            class="bg-black text-white px-4 py-2 text-[10px] uppercase font-bold rounded hover:bg-gray-800 transition-colors">Ajouter</button>
                    </div>
                </div>
                <!-- File Input -->
                <div class="col-span-12">
                    <div class="relative">
                        <label class="block text-[10px] uppercase font-bold text-gray-400 mb-1">Upload depuis PC</label>
                        <label
                            class="flex items-center justify-center border-2 border-dashed border-gray-200 rounded-lg py-4 cursor-pointer hover:border-black hover:bg-gray-50 transition-all group">
                            <div class="text-center">
                                <svg class="w-8 h-8 text-gray-400 mx-auto mb-2 group-hover:text-black transition-colors"
                                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                                </svg>
                                <span class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Cliquez pour
                                    uploader</span>
                            </div>
                            <input type="file" (change)="onFileSelected($event)" accept="image/*" class="hidden">
                        </label>
                    </div>
                </div>
            </div>

            <!-- Gallery -->
            <div class="mb-2 flex justify-between items-center">
                <label class="block text-[10px] uppercase font-bold text-gray-400">Images actuelles ({{
                    variant?.images?.length || 0 }})</label>
                <span class="text-[10px] text-gray-400 italic" *ngIf="variant?.images?.length">Survolez pour
                    supprimer</span>
            </div>
            <div class="grid grid-cols-4 gap-3 max-h-60 overflow-y-auto p-1 custom-scrollbar">
                <div *ngFor="let img of variant?.images; let idx = index"
                    class="relative group aspect-square rounded-lg overflow-hidden border border-gray-100 bg-gray-50 shadow-sm animate-in zoom-in-50 duration-200">
                    <img [src]="img" class="w-full h-full object-cover">
                    <button (click)="removeImage(idx)"
                        class="absolute inset-0 bg-black/40 flex items-center justify-center text-white opacity-0 group-hover:opacity-100 transition-opacity">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                            </path>
                        </svg>
                    </button>
                </div>
                <div *ngIf="!variant?.images?.length"
                    class="col-span-full py-12 text-center bg-gray-50 border-2 border-dashed border-gray-100 rounded-xl">
                    <svg class="w-8 h-8 text-gray-200 mx-auto mb-2" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                        </path>
                    </svg>
                    <span class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">Aucune image</span>
                </div>
            </div>
        </div>

        <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex justify-end">
            <button (click)="close.emit()"
                class="bg-black text-white px-8 py-2 text-xs uppercase font-bold tracking-wider hover:bg-gray-800 transition-colors shadow-lg shadow-gray-200 rounded-sm">Terminer</button>
        </div>
    </div>
</div>
