<div class="min-h-full bg-gray-50 font-sans">
  <!-- Header -->
  <div class="bg-white border-b border-gray-100">
    <div class="max-w-5xl mx-auto px-6 py-12">
      <h1 class="text-4xl font-extralight text-gray-900 mb-4 tracking-tight">Mes Commandes</h1>
      <div class="h-0.5 w-12 bg-black"></div>
    </div>
  </div>

  <div class="max-w-5xl mx-auto px-6 py-12">
    <!-- Filter Bar -->
    <div class="bg-white border border-gray-100 shadow-sm rounded-xl mb-12">
      <div class="p-6">
        <div class="flex flex-wrap items-center gap-6">
          <div class="flex-grow grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="relative">
              <label
                class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1.5 block"
                >Boutique</label
              >
              <input
                type="text"
                [ngModel]="filterShop()"
                (ngModelChange)="filterShop.set($event); applyFilters()"
                placeholder="Nom du shop..."
                class="w-full bg-gray-50 border-none rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-black/5 transition-all outline-none"
              />
            </div>
            <div class="relative">
              <label
                class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1.5 block"
                >Article</label
              >
              <input
                type="text"
                [ngModel]="filterItem()"
                (ngModelChange)="filterItem.set($event); applyFilters()"
                placeholder="Produit..."
                class="w-full bg-gray-50 border-none rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-black/5 transition-all outline-none"
              />
            </div>
            <div class="relative">
              <app-select
                [label]="'Statut'"
                [options]="statusOptions"
                [ngModel]="filterStatus()"
                (ngModelChange)="filterStatus.set($event); applyFilters()"
              ></app-select>
            </div>
            <div class="grid grid-cols-2 gap-2">
              <div>
                <label
                  class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1.5 block"
                  >Min</label
                >
                <input
                  type="number"
                  [ngModel]="filterMinTotal()"
                  (ngModelChange)="filterMinTotal.set($event); applyFilters()"
                  placeholder="Ar"
                  class="w-full bg-gray-50 border-none rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-black/5 transition-all outline-none"
                />
              </div>
              <div>
                <label
                  class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1.5 block"
                  >Max</label
                >
                <input
                  type="number"
                  [ngModel]="filterMaxTotal()"
                  (ngModelChange)="filterMaxTotal.set($event); applyFilters()"
                  placeholder="Ar"
                  class="w-full bg-gray-50 border-none rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-black/5 transition-all outline-none"
                />
              </div>
            </div>
          </div>
          <div class="flex items-end self-end pb-0.5">
            <button
              (click)="resetFilters()"
              class="text-[10px] uppercase tracking-widest text-gray-400 hover:text-black font-bold transition-colors"
            >
              Réinitialiser
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Loading State -->
    <div *ngIf="loading()" class="flex justify-center items-center py-20">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-black"></div>
    </div>

    <!-- Empty State -->
    <app-empty-state
      *ngIf="!loading() && orders().length === 0"
      title="Aucune commande trouvée"
      message="Nous n'avons trouvé aucune commande correspondant à vos filtres."
      buttonText="Commencer mes achats"
      [link]="['/']"
      [icon]="icons.empty"
    >
    </app-empty-state>

    <!-- Orders List -->
    <div *ngIf="!loading() && orders().length > 0" class="space-y-8">
      <app-order-card *ngFor="let order of orders()" [order]="order" (cancel)="cancelOrder($event)">
      </app-order-card>

      <!-- Pagination -->
      <div class="pt-8 flex justify-center border-t border-gray-100">
        <app-pagination
          [currentPage]="page()"
          [totalPages]="totalPages()"
          (pageChange)="changePage($event)"
        >
        </app-pagination>
      </div>
    </div>
  </div>
</div>

@if (showConfirmModal()) {
  <app-confirm-modal
    [title]="'Annulation de commande'"
    [message]="'Êtes-vous sûr de vouloir annuler cette commande ?'"
    [confirmText]="'Confirmer l\'annulation'"
    [cancelText]="'Garder la commande'"
    [type]="'danger'"
    (confirm)="confirmCancel()"
    (cancel)="onCancelModal()"
  ></app-confirm-modal>
}
