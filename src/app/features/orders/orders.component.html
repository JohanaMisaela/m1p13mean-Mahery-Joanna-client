<div class="min-h-screen bg-gray-50 font-sans">
    <!-- Header -->
    <div class="bg-white border-b border-gray-100">
        <div class="max-w-5xl mx-auto px-6 py-12">
            <h1 class="text-4xl font-extralight text-gray-900 mb-4 tracking-tight">Mes Commandes</h1>
            <div class="h-0.5 w-12 bg-black"></div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-6 py-12">
        <!-- Loading State -->
        <div *ngIf="loading()" class="flex justify-center items-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-black"></div>
        </div>

        <!-- Empty State -->
        <app-empty-state *ngIf="!loading() && orders().length === 0" title="Aucune commande trouvée"
            message="Vous n'avez pas encore passé de commande sur notre boutique." buttonText="Commencer mes achats"
            [link]="['/']" [icon]="icons.empty">
        </app-empty-state>

        <!-- Orders List -->
        <div *ngIf="!loading() && orders().length > 0" class="space-y-8">
            <app-order-card *ngFor="let order of orders()" [order]="order" (cancel)="cancelOrder($event)">
            </app-order-card>
        </div>
    </div>
</div>
