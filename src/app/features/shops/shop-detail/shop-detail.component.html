<div class="h-full bg-gray-50 flex overflow-hidden">
    <!-- Mobile Filter Toggle -->
    <button (click)="toggleSidebar()"
        class="fixed bottom-4 right-4 z-50 lg:hidden bg-black text-white p-4 rounded-full shadow-lg">
        <fa-icon [icon]="icons.filter"></fa-icon>
    </button>

    <!-- Sidebar Filters -->
    <app-filter-sidebar [filterForm]="filterForm" [categories]="categories()" [isOpen]="showFilterSidebar()"
        [showShopFilter]="false" [currentPage]="currentPage()" [totalPages]="totalPages()" (close)="toggleSidebar()"
        (reset)="resetFilters()" (pageChange)="onPageChange($event)">
    </app-filter-sidebar>

    <!-- Loading State (Global) -->
    @if (loading()) {
    <div class="flex-1 flex items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-black"></div>
    </div>
    } @else {
    <!-- Main Content Area -->
    <main class="flex-1 px-4 lg:px-8 overflow-y-auto flex flex-col shop-products-container">

        <!-- Shop Banner (Sticky at top of content) -->
        <app-shop-header [shop]="shop()" [currentUser]="currentUser()!" [userRating]="userRating()"
            (ratingChange)="submitRating($event)"></app-shop-header>

        <!-- Product List Header -->


        <!-- Products Grid Area -->
        <div class="flex-1 flex flex-col">
            @if (loadingProducts()) {
            <div class="flex-1 flex justify-center items-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-black"></div>
            </div>
            } @else {
            @if (products().length > 0) {
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-20">
                @for (product of products(); track product._id) {
                <app-product-card [product]="product"></app-product-card>
                }
            </div>


            } @else {
            <!-- Standardized Empty State -->
            <app-empty-state title="Aucun produit trouvé" message="Essayez de modifier vos filtres de recherche"
                buttonText="Réinitialiser les filtres" [icon]="icons.shop" (action)="resetFilters()">
            </app-empty-state>
            }

            }
            <app-pagination [currentPage]="currentPage()" [totalPages]="totalPages()"
                (pageChange)="onPageChange($event)"></app-pagination>
        </div>
    </main>
    }
</div>
