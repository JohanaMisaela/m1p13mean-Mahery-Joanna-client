<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4 py-12 font-sans text-gray-900">
    <div class="w-full max-w-md">
        <!-- Login Card -->
        <div class="bg-white rounded-none shadow-lg border border-gray-200 p-8">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-light uppercase tracking-widest text-black mb-2">Login</h1>
                <p class="text-gray-500 text-sm">Welcome back to your account</p>
            </div>

            <!-- Error Message -->
            @if (errorMessage()) {
            <div class="mb-6 p-4 bg-gray-100 border-l-4 border-black text-gray-700 text-sm">
                <p>{{ errorMessage() }}</p>
            </div>
            }

            <!-- Login Form -->
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
                <!-- Email Field -->
                <div>
                    <label for="email" class="block text-xs font-bold uppercase tracking-wider text-gray-700 mb-2">
                        Email Address
                    </label>
                    <input id="email" type="email" formControlName="email" placeholder="you@example.com"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-300 text-gray-900 placeholder-gray-400 focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition-colors rounded-none"
                        [class.border-red-500]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" />
                    @if (getErrorMessage('email')) {
                    <p class="mt-1 text-xs text-red-600 italic">{{ getErrorMessage('email') }}</p>
                    }
                </div>

                <!-- Password Field -->
                <div>
                    <label for="password" class="block text-xs font-bold uppercase tracking-wider text-gray-700 mb-2">
                        Password
                    </label>
                    <div class="relative">
                        <input id="password" [type]="showPassword() ? 'text' : 'password'" formControlName="password"
                            placeholder="•••••"
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-300 text-gray-900 placeholder-gray-400 focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition-colors pr-12 rounded-none"
                            [class.border-red-500]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" />
                        <button type="button" (click)="togglePasswordVisibility()"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-900 transition-colors">
                            @if (showPassword()) {
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            } @else {
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                            </svg>
                            }
                        </button>
                    </div>
                    @if (getErrorMessage('password')) {
                    <p class="mt-1 text-xs text-red-600 italic">{{ getErrorMessage('password') }}</p>
                    }
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center text-gray-600 cursor-pointer hover:text-black transition-colors">
                        <input type="checkbox" class="mr-2 rounded-none border-gray-300 text-black focus:ring-black">
                        Remember me
                    </label>
                    <a href="#" class="text-gray-500 hover:text-black underline transition-colors">
                        Forgot password?
                    </a>
                </div>

                <!-- Submit Button -->
                <button type="submit" [disabled]="isLoading()"
                    class="w-full py-3 px-4 bg-black hover:bg-gray-800 text-white font-medium uppercase tracking-wider shadow-sm hover:shadow-md transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed rounded-none">
                    @if (isLoading()) {
                    <span class="flex items-center justify-center">
                        <svg class="animate-spin -ml-1 mr-3 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        Processing...
                    </span>
                    } @else {
                    Sign In
                    }
                </button>
            </form>

            <!-- Sign Up Link -->
            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <p class="text-gray-500 text-sm">
                    Don't have an account?
                    <a routerLink="/auth/signup" class="text-black font-semibold hover:underline bg-transparent ml-1">
                        Create one
                    </a>
                </p>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-gray-400 text-xs mt-8 uppercase tracking-widest">
            © 2026 E-Commerce
        </p>
    </div>
</div>
